name: NeonDB Connection Checker

on:
  workflow_dispatch:
    inputs:
      input_file:
        description: "Path to the neondb NDJSON findings file"
        required: false
        default: "results_neondb/neondb.ndjson"
        type: string
      output_file:
        description: "Path to save the JSON connection report"
        required: false
        default: "results_neondb/connection_report.json"
        type: string
      workers:
        description: "Concurrent NeonDB checks"
        required: false
        default: "25"
        type: string

jobs:
  check-connections:
    name: Check NeonDB Connections and List Tables
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install psycopg2-binary

      - name: Check connections and list tables
        run: |
          python tools/check_neondb_connection.py \
            --input "${{ inputs.input_file }}" \
            --output "${{ inputs.output_file }}" \
            --workers "${{ inputs.workers }}"

      - name: Upload connection report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: neondb-connections-${{ github.run_id }}
          path: ${{ inputs.output_file }}
          if-no-files-found: warn
          retention-days: 30

      - name: Commit and push connection report
        if: always()
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f "${{ inputs.output_file }}" || true
          git diff --staged --quiet || git commit -m "neondb connection report [run #${{ github.run_number }}]"
          git push
