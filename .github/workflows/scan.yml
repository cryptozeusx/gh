name: .env Key Scanner

on:
  workflow_dispatch:
    inputs:
      max_results:
        description: "Max files in the broad pass"
        required: false
        default: "50"
        type: string
      output_dir:
        description: "Output directory name"
        required: false
        default: "results"
        type: string
      repo:
        description: "Specific repo to scan (owner/repo) — blank for global"
        required: false
        default: ""
        type: string
      user:
        description: "Specific GitHub user to scan — blank for global"
        required: false
        default: ""
        type: string
      verbose:
        description: "Verbose output"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  scan:
    name: Run .env Scanner
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install curl-cffi

      - name: Run scanner
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.SCANNER_GITHUB_TOKEN }}
        run: |
          ARGS="--token $GITHUB_TOKEN"
          ARGS="$ARGS --max-results ${{ inputs.max_results }}"
          ARGS="$ARGS --output ${{ inputs.output_dir }}"
          [[ -n "${{ inputs.repo }}" ]] && ARGS="$ARGS --repo ${{ inputs.repo }}"
          [[ -n "${{ inputs.user }}" ]] && ARGS="$ARGS --user ${{ inputs.user }}"
          [[ "${{ inputs.verbose }}" == "true" ]] && ARGS="$ARGS --verbose"
          python main.py $ARGS || EXIT=$?
          # exit 1 = findings found (expected). exit 0 = no findings. anything else = real error.
          [[ "${EXIT:-0}" -le 1 ]] || exit $EXIT

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scan-results-${{ github.run_id }}
          path: ${{ inputs.output_dir }}/
          if-no-files-found: warn
          retention-days: 30
